<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="极简黑白个人博客，基于 Markdown 静态文章和 GitHub Pages 部署。" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="简约个人博客" />
  <meta property="og:description" content="极简黑白个人博客，基于 Markdown 静态文章和 GitHub Pages 部署。" />
  <meta property="og:image" content="assets/favicon.svg" />
  <title>简约个人博客</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
</head>
<body data-page="index">
  <div class="page-shell">
    <header class="site-header">
      <div>
        <p class="eyebrow">个人博客</p>
        <h1>简约个人博客</h1>
        <p class="intro">这是我的静态博客，所有文章以 Markdown 保存在本地文件中，支持标签、搜索、代码高亮与公式渲染。</p>
      </div>
      <nav class="top-nav">
        <a href="index.html" class="active">首页</a>
        <a href="about.html">关于</a>
      </nav>
    </header>

    <section class="controls">
      <div class="control-item">
        <label for="search">搜索文章</label>
        <input id="search" type="search" placeholder="搜索标题" autocomplete="off" />
      </div>
      <div class="control-item">
        <label>按标签筛选</label>
        <div class="tag-list" id="tag-list"></div>
      </div>
    </section>

    <section>
      <div class="section-title">
        <h2>最新文章</h2>
        <p id="post-count"></p>
      </div>
      <div id="posts" class="post-list"></div>
    </section>
  </div>

  <footer class="site-footer">
    <p>© 2026 简约个人博客 • 基于 GitHub Pages 部署</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
