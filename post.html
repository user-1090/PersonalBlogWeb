<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="文章页面，支持 Markdown 渲染、代码高亮与数学公式。" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="文章 - Houdwwe's Blog" />
  <meta property="og:description" content="文章页面，支持 Markdown 渲染、代码高亮与数学公式。" />
  <meta property="og:image" content="assets/favicon.svg" />
  <title>文章 - Houdwwe's Blog</title>
  <link rel="stylesheet" href="css/style.css" />
  
  <link rel="stylesheet" href="https://unpkg.com/katex@0.16.8/dist/katex.min.css" />
  
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
</head>
<body data-page="post">
  <div class="page-shell">
    <header class="site-header">
      <div>
        <p class="eyebrow">文章详情</p>
        <h1 id="post-title">加载中...</h1>
        <p id="post-meta" class="post-meta"></p>
      </div>
      <nav class="top-nav">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
      </nav>
    </header>

    <main class="post-layout">
      <article class="content-card post-content" id="post-content"></article>
      <aside class="toc-card" id="toc-card">
        <p class="toc-title">目录</p>
        <nav id="toc"></nav>
      </aside>
    </main>

    <section class="post-nav-links">
      <a id="prev-post" class="post-nav-item" href="#"></a>
      <a id="next-post" class="post-nav-item" href="#"></a>
    </section>
  </div>

  <div class="image-preview" id="image-preview" aria-hidden="true">
    <button class="preview-close" id="preview-close" aria-label="关闭预览">×</button>
    <img id="preview-image" alt="图片预览" />
  </div>

  <footer class="site-footer">
    <p>© 2026 Houdwwe's Blog • Markdown 静态文章</p>
  </footer>

  <script src="https://unpkg.com/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
  <script src="https://unpkg.com/markdown-it-anchor@8.6.2/dist/markdown-it-anchor.min.js"></script>
  <script src="https://unpkg.com/markdown-it-katex@4.1.0/dist/markdown-it-katex.min.js"></script>
  <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
  
  <script src="js/app.js"></script>
</body>
</html>
